# Setup
title: 走开
description: Muss es Sein
url: https://xiangkaik.github.io
avatar: /avatar.jpg
paginate: 5
permalink: pretty
cover_image: /bg.JPG

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: xk_iuy
  card: summary
logo: logo.png
social:
  name: xiangkai
  links:
    - https://twitter.com/xk_iuy
    - https://github.com/xiangkaik
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: xiangkai
  url: https://github.com/xiangkaik/
  email: kaizhou0305@gmail.com
